<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/poll-form.css">
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet">

    <title>WDD 130|HTML</title>
</head>

<body>
    <header>
        <h1>130|HTML Form-User Poll</h1>
    </header>
    <main>
        <main>
            <form>

                <fieldset>
                    <legend>User Information</legend>

                    <div class="form-item column2">
                        <label for="fullname">Full Name:</label>
                        <input type="text" id="fullname" name="fullname" required>
                    </div>

                    <div class="form-item column2">
                        <label for="email">Email:</label>
                        <input type="email" id="email" name="usermail" required>
                    </div>

                </fieldset>

                <fieldset>
                    <legend>Questions</legend>

                    <div class="form-item column1">
                        <label for="browser">Favorite Browser:</label>
                        <select id="browser" name="browser">
                            <option value="chrome">Chrome</option>
                            <option value="safari">Safari</option>
                            <option value="firefox">Firefox</option>
                        </select>
                    </div>

                    <div class="form-item column1">
                        <label for="pet">Do you have pets?</label>
                        <input type="checkbox" id="pet" name="pet">
                    </div>

                    <div class="form-item">
                        <label for="feedback">Cities you have lived:</label>
                        <textarea id="feedback" name="feedback" rows="4"></textarea>
                    </div>

                </fieldset>

                <button type="submit">Submit Poll</button>

            </form>
        </main>
    </main>
    <footer>
        <p>© 2026 | Patricia Harris</p>
    </footer>

</body>

</html>
