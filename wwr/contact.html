<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | White Water Rafting</title>
    <link rel="stylesheet" href="styles/rafting.css">
    <meta name="description"
      content="Contact White Water Rafting for reservations, questions, or suggestions. We are here to help you plan your adventure!">
    <meta name="author" content="Patricia Harris">
</head>

<body>
    <header>
        <img src="images/logo.png" alt="logo">
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>
    <main>

        <div class="opa">
            <h1>Contact Us</h1>
            <article>
                <p>Calle Cuatro 3610</p>
                <p>Tortuga, Narnia</p>
                <p>+56 9 03003030030</p>
                <p>raftingdelasnarnias@gmail.com</p>
            </article>
        </div>
        <div class="contact-container">

            <section class="contact-info">
                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3329.825153928807!2d-70.66926548480073!3d-33.44888907988039!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x9662c5f6b1c1c1c1%3A0x8c8c8c8c8c8c8c8c!2sSantiago%2C%20Chile!5e0!3m2!1sen!2scl!4v1710000000000">
                </iframe>
            </section>

            <section class="contact-form">
                <h2>Contact Form</h2>

                <form>
                    <label for="name">Full Name:</label>
                    <input type="text" id="name" name="name" required>

                    <label for="email">Email Address:</label>
                    <input type="email" id="email" name="email" required>

                    <p>Purpose of Message:</p>

                    <label>
                        <input type="radio" name="purpose" value="general" required>
                        General Inquiry
                    </label>

                    <label>
                        <input type="radio" name="purpose" value="reservation">
                        Reservation Question
                    </label>

                    <label>
                        <input type="radio" name="purpose" value="suggestion">
                        Website Suggestion
                    </label>

                    <label for="message">Message:</label>
                    <textarea id="message" name="message" required></textarea>

                    <label>
                        <input type="checkbox" name="subscribe">
                        Please subscribe me to the monthly newsletter
                    </label>

                    <button type="submit">Send Message</button>
                </form>
            </section>

        </div>

        <section class="adventures">
            <h2>We Are Here to Serve You</h2>

            <figure>
                <img src="images/trabajador1.jpeg" alt="Employer Loreto">
                <figcaption>Loreto Fierras - Trip Coordinator</figcaption>
            </figure>

            <figure>
                <img src="images/trabjador2.jpeg" alt="Employer Amanda">
                <figcaption>Amanda Garcia - Operations Manager</figcaption>
            </figure>

            <figure>
                <img src="images/trabajador3.jpg" alt="Employer Eduardo Letelier">
                <figcaption>Eduardo Letelier - River Guide</figcaption>
            </figure>

        </section>

    </main>


    <footer>
        <p>© 2026 🥭 Rafting Patagonico 🥭 Patricia Harris</p>
        <nav class="socialmedia">
            <a href="https://www.facebook.co">
                <img src="images/facebook.png" alt="logo facebook">
            </a>
            <a href="https://www.instagram.com">
                <img src="images/instagram.png" alt="logo instagram">
            </a>
            <a href="https://www.whatsapp.com">
                <img src="images/whatsapp.png" alt="logo whatsapp">
            </a>
        </nav>
    </footer>

</body>

</html>
